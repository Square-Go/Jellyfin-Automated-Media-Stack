<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media Services</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 480px; width: 100%; padding: 2rem 1rem; }
  .label { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .services { display: flex; flex-direction: column; gap: 8px; }
  a.service { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 12px; border: 1px solid #2a2a2a; text-decoration: none; color: inherit; transition: border-color 0.15s; }
  a.service:hover { border-color: #555; }
  .service-name { font-weight: 500; font-size: 15px; }
  .service-desc { font-size: 13px; color: #888; margin-left: 8px; }
  .service-port { font-size: 13px; color: #555; font-family: monospace; }
  .host-info { font-size: 12px; color: #555; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <p class="label">Media services</p>
  <div class="services" id="services"></div>
  <p class="host-info" id="host-info"></p>
</div>
<script>
const services = [
  { name: 'Jellyfin', port: 8096, desc: 'Media player' },
  { name: 'Sonarr', port: 8989, desc: 'TV shows' },
  { name: 'Radarr', port: 7878, desc: 'Movies' },
  { name: 'Prowlarr', port: 9696, desc: 'Indexers' },
  { name: 'Seerr', port: 5055, desc: 'Requests' },
  { name: 'Bazaar', port: 6767, desc: 'Subtitles' },
  { name: 'qBittorrent', port: 8080, desc: 'Downloads' },
  { name: 'FlareSolver', port: 8191, desc: 'Cloudflare Bypass' },
];
const host = window.location.hostname;
const container = document.getElementById('services');
services.forEach(s => {
  const a = document.createElement('a');
  a.href = `http://${host}:${s.port}`;
  a.target = '_blank';
  a.className = 'service';
  a.innerHTML = `<div><span class="service-name">${s.name}</span><span class="service-desc">${s.desc}</span></div><span class="service-port">:${s.port}</span>`;
  container.appendChild(a);
});
document.getElementById('host-info').textContent = host;
</script>
</body>
</html>
